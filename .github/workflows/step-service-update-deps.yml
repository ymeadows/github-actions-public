# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Update UV Dependencies
on:
  workflow_call:
    inputs:
      repo-name:
        required: false
        description: 'The name of the repository.'
        type: string
      python-version:
        required: false
        description: 'The version of python to use.'
        default: '3.13'
        type: string
      base-branch:
        required: false
        description: 'The base branch for the pull request.'
        default: 'main'
        type: string
      runs-on:
        required: false
        description: 'The runner type to use for the job.'
        default: 'ubuntu-latest'
        type: string
    secrets:
      app-private-key:
        required: true
        description: 'The private key for the ym-dependency-updater GitHub App.'

jobs:
  update-dependencies:
    runs-on: ${{ inputs.runs-on }}
    steps:
    - name: Generate GitHub App token
      id: app-token
      uses: actions/create-github-app-token@df432ceedc7162793a195dd1713ff69aefc7379e # v2.0.6
      with:
        app-id: 255840
        private-key: ${{ secrets.app-private-key }}

    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        ref: ${{ inputs.base-branch }}
        token: ${{ steps.app-token.outputs.token }}

    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '${{ inputs.python-version }}'

    - name: Set up uv
      uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      with:
        enable-cache: true
        ignore-nothing-to-cache: true
        prune-cache: false

    - name: Store original lock file
      run: |
        if [ -f uv.lock ]; then
          cp uv.lock uv.lock.original
        else
          echo "No uv.lock file found"
          exit 1
        fi

    - name: Update dependencies
      id: update
      run: |
        echo "Running uv lock --upgrade..."
        uv lock --upgrade
        echo "Running uv sync..."
        uv sync
        echo "Dependency update completed"

    - name: Parse version changes
      id: parse_changes
      run: |
        python3 << 'EOF'
        import tomllib

        def parse_lock_file(file_path):
            with open(file_path, 'rb') as f:
                data = tomllib.load(f)
            return {p['name']: p['version'] for p in data.get('package', [])}

        old_packages = parse_lock_file('uv.lock.original')
        new_packages = parse_lock_file('uv.lock')

        changes = []
        for name, new_ver in sorted(new_packages.items()):
            if name in old_packages and old_packages[name] != new_ver:
                changes.append(f"- **{name}**: {old_packages[name]} → {new_ver}")
        for name, ver in sorted(new_packages.items()):
            if name not in old_packages:
                changes.append(f"- **{name}**: (new) → {ver}")
        for name, ver in sorted(old_packages.items()):
            if name not in new_packages:
                changes.append(f"- **{name}**: {ver} → (removed)")

        with open('/tmp/version_changes.md', 'w') as f:
            f.write('\n'.join(changes) if changes else "No specific version changes detected.")
        print(f"Found {len(changes)} package changes" if changes else "No version changes detected")
        EOF

    - name: Clean up temporary files
      run: rm -f uv.lock.original

    - name: Generate PR body
      id: pr_body
      run: |
        VERSION_CHANGES=$(cat /tmp/version_changes.md)

        # Create PR body file for create-pull-request action
        cat > /tmp/pr_body.md <<EOF_PR
        ## Summary
        Automated update of uv dependencies to their latest compatible versions.

        ## Changes
        $VERSION_CHANGES

        ## Details
        - Generated by: GitHub Actions workflow
        - Run ID: ${{ github.run_id }}
        - Workflow: \`step-service-update-deps.yml\`

        This PR will auto-merge once all required checks pass.
        EOF_PR

    - name: Create Pull Request
      id: cpr
      uses: peter-evans/create-pull-request@5e914681df9dc83aa4e4905692ca88beb2f9e91f # v7.0.5
      with:
        token: ${{ steps.app-token.outputs.token }}
        commit-message: |
          YM-293: Update uv dependencies

          Automated dependency update via GitHub Actions.
          Run ID: ${{ github.run_id }}
        committer: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
        author: github-actions[bot] <41898282+github-actions[bot]@users.noreply.github.com>
        branch: YM-293-deps-update-${{ github.run_id }}
        base: ${{ inputs.base-branch }}
        delete-branch: true
        title: "YM-293: Update uv dependencies"
        body-path: /tmp/pr_body.md
        labels: dependencies
        assignees: ${{ github.actor }}
        sign-commits: true

    - name: Enable auto-merge
      if: steps.cpr.outputs.pull-request-number != ''
      env:
        GH_TOKEN: ${{ steps.app-token.outputs.token }}
      run: |
        # Enable auto-merge with squash strategy
        gh pr merge ${{ steps.cpr.outputs.pull-request-number }} --auto --squash

        echo "Auto-merge enabled on PR #${{ steps.cpr.outputs.pull-request-number }}"

    - name: Summary
      if: always()
      run: |
        if [ "${{ steps.cpr.outputs.pull-request-number }}" != "" ]; then
          echo "✅ Dependencies updated and PR created with auto-merge enabled"
          echo "PR: ${{ steps.cpr.outputs.pull-request-url }}"
          echo "Branch: YM-293-deps-update-${{ github.run_id }}"
        else
          echo "ℹ️ No dependency updates available - all packages are up to date"
        fi
