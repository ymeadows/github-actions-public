# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Validate PR
on:
  workflow_call:
    inputs:
      epoch:
        required: false
        default: 1
        description: 'The major version number of the step-service.'
        type: number
      repo-name:
        required: false
        description: 'The name of the repository.'
        type: string
      python-version:
        required: false
        description: 'The version of python used in the build.'
        default: '3.10'
        type: string
    secrets:
      gcp-credentials:
        required: false
        description: 'The path to the GCP credentials file.'
      github-token:
        required: false
        description: 'The GitHub token.'
      sonar-token:
        required: false
        description: 'The SonarCloud token.'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0
      with:
        fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
        lfs: true
    - name: LFS Checkout
      run: git lfs checkout
    - name: Set up Python
      uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
      with:
        python-version: '${{ inputs.python-version }}'
    - name: Set up uv
      uses: astral-sh/setup-uv@681c641aba71e4a1c380be3ab5e12ad51f415867 # v7.1.6
      with:
        enable-cache: true
    - name: Run setup.sh if it exists
      run: |
        if [ -f setup.sh ]; then bash setup.sh; fi
    - name: Install dependencies (uv)
      run: |
        uv sync --locked --dev
    - name: Check for dev-only dependency imports in production code
      run: |
        # Create a prod-only venv mirroring Docker's UV_NO_DEV=1 behavior
        uv venv /tmp/prod-deps-check --python ${{ inputs.python-version }}
        UV_PROJECT_ENVIRONMENT=/tmp/prod-deps-check uv sync --locked --no-dev --no-install-project --inexact

        # Run the import checker using the prod-only venv's Python so that
        # importlib.util.find_spec resolves against exactly the prod dependency set
        /tmp/prod-deps-check/bin/python << 'PYEOF'
        import ast
        import importlib.util
        import os
        import sys
        from collections import defaultdict

        if sys.version_info < (3, 10):
            print("Python < 3.10: skipping dev-dependency import check (sys.stdlib_module_names unavailable)")
            sys.exit(0)


        class ImportCollector(ast.NodeVisitor):
            """Collects import names from an AST, skipping TYPE_CHECKING and try/except ImportError blocks."""

            def __init__(self):
                self.imports = set()

            def visit_If(self, node):
                test = node.test
                if isinstance(test, ast.Name) and test.id == "TYPE_CHECKING":
                    return
                if isinstance(test, ast.Attribute) and test.attr == "TYPE_CHECKING":
                    return
                self.generic_visit(node)

            def visit_Try(self, node):
                handler_types = set()
                for handler in node.handlers:
                    if handler.type is None:
                        handler_types.add("bare")
                    elif isinstance(handler.type, ast.Name):
                        handler_types.add(handler.type.id)
                    elif isinstance(handler.type, ast.Tuple):
                        for elt in handler.type.elts:
                            if isinstance(elt, ast.Name):
                                handler_types.add(elt.id)
                if handler_types & {"ImportError", "ModuleNotFoundError"}:
                    return
                self.generic_visit(node)

            def visit_Import(self, node):
                for alias in node.names:
                    self.imports.add(alias.name)

            def visit_ImportFrom(self, node):
                if node.module and node.level == 0:
                    self.imports.add(node.module)


        def is_test_file(filename):
            return filename.startswith("test_") or filename.endswith("_test.py") or filename == "conftest.py"


        def get_local_packages():
            names = set()
            for entry in os.listdir("."):
                if os.path.isdir(entry) and os.path.isfile(os.path.join(entry, "__init__.py")):
                    names.add(entry)
            return names


        # Scan production Python files in app/
        all_imports = set()
        import_sources = defaultdict(set)  # module -> set of files that import it

        for root, dirs, files in os.walk("app"):
            dirs[:] = [d for d in dirs if d != "__pycache__"]
            for f in files:
                if not f.endswith(".py") or is_test_file(f):
                    continue
                filepath = os.path.join(root, f)
                try:
                    with open(filepath) as fh:
                        tree = ast.parse(fh.read(), filename=filepath)
                except SyntaxError:
                    continue
                collector = ImportCollector()
                collector.visit(tree)
                for imp in collector.imports:
                    all_imports.add(imp)
                    import_sources[imp].add(filepath)

        if not all_imports:
            print("No imports found in production code. Skipping check.")
            sys.exit(0)

        # Filter to third-party imports only
        stdlib = sys.stdlib_module_names
        local = get_local_packages()
        third_party = {imp for imp in all_imports if imp.split(".")[0] not in stdlib and imp.split(".")[0] not in local}

        # Check each import against the prod-only environment
        missing = []
        for imp in sorted(third_party):
            top_level = imp.split(".")[0]
            spec = importlib.util.find_spec(top_level)
            if spec is None:
                missing.append(imp)
                continue
            if "." in imp:
                try:
                    if importlib.util.find_spec(imp) is None:
                        missing.append(imp)
                except (ModuleNotFoundError, ValueError):
                    missing.append(imp)

        if missing:
            print("::error::Production code imports packages not in production dependencies!")
            print()
            print("The following imports in app/ (non-test files) are NOT available when")
            print("only production dependencies are installed. They may work in CI because")
            print("they are transitive dependencies of dev-only packages, but they will")
            print("FAIL in the production Docker image (which uses UV_NO_DEV=1).")
            print()
            for m in missing:
                files = ", ".join(sorted(import_sources[m]))
                print(f"  - '{m}' imported in: {files}")
            print()
            print("To fix, either:")
            print("  1. Add the package to [project.dependencies] in pyproject.toml")
            print("  2. Remove the import from production code")
            print("  3. Guard the import with: try/except ImportError")
            sys.exit(1)
        else:
            print(f"All {len(third_party)} third-party imports in production code are satisfied by production dependencies.")
        PYEOF
    - name: Check for syntax errors with ruff
      uses: astral-sh/ruff-action@v3
      with:
        args: "check app --select=E9,F63,F7,F82"
    - name: Lint with ruff
      uses: astral-sh/ruff-action@v3
      with:
        args: "check app --select=E,F,W,C90 --line-length=256 --exit-zero"
    - name: Check formatting with ruff
      uses: astral-sh/ruff-action@v3
      with:
        args: "format --check --line-length=256 --diff app"
      continue-on-error: true
    - name: Test with pytest
      run: |
        uv run pytest
    - id: setup-sonarcloud
      name: 'Setup SonarCloud Project'
      uses: 'ymeadows/github-actions-public/.github/actions/setup-sonarcloud@main'
      if: ${{ github.actor != 'dependabot[bot]' }}
      with:
        repo-name: ${{ inputs.repo-name }}
        organization: 'ymeadows'
        sonar-token: ${{ secrets.sonar-token }}
    - id: write-sonar-properties
      uses: DamianReeves/write-file-action@6929a9a6d1807689191dcc8bbe62b54d70a32b42 # v1.3
      with:
        path: sonar-project.properties
        contents: |
          sonar.projectKey=${{ steps.setup-sonarcloud.outputs.key }}
          sonar.organization=ymeadows
          sonar.sourceEncoding=UTF-8
          sonar.python.version=${{ inputs.python-version }}
        write-mode: preserve
    - name: SonarCloud Scan
      uses: SonarSource/sonarqube-scan-action@1a6d90ebcb0e6a6b1d87e37ba693fe453195ae25 # v5.3.1
      if: ${{ github.actor != 'dependabot[bot]' }}
      env:
        GITHUB_TOKEN: ${{ secrets.github-token }}  # Needed to get PR information, if any
        SONAR_TOKEN: ${{ secrets.sonar-token }}
        args: >
         -Dsonar.organization=ymeadows
         -Dsonar.projectKey=${{ steps.setup-sonarcloud.outputs.key }}
         -Dsonar.python.version=${{ inputs.python-version }}
    - name: Authenticate to Google Cloud
      id: 'auth'
      if: ${{ github.actor != 'dependabot[bot]' }}
      uses: 'google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093' # v3.0.0
      with:
        credentials_json: '${{ secrets.gcp-credentials }}'
    - name: Setup Google Cloud
      if: ${{ github.actor != 'dependabot[bot]' }}
      uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3.0.1
      with:
        project_id: 't0-prod'
    - name: Setup Docker
      if: ${{ github.actor != 'dependabot[bot]' }}
      run: |-
        gcloud --quiet auth configure-docker
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      if: ${{ github.actor != 'dependabot[bot]' }}
    - id: docker-name-step
      name: 'Derive Docker Name'
      uses: 'ymeadows/github-actions-public/.github/actions/derive-docker-name@main'
      with:
        repo-name: ${{ inputs.repo-name }}
    - name: Build Docker Image
      uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 #v6.18.0
      if: ${{ github.actor != 'dependabot[bot]' }}
      with:
        context: .
        push: false
        pull: true
        load: true
        tags: gcr.io/t0-prod/${{ steps.docker-name-step.outputs.docker-name }}:pr-test-${{ inputs.epoch }}.${{ github.run_number }}
        cache-from: type=gha
        cache-to: type=gha,mode=max
    - name: Load Trivy configuration
      id: trivy-configuration
      run: |
        if [ -f scan-files-to-ignore.txt ]; then echo "files-to-ignore=$(cat scan-files-to-ignore.txt)" >> $GITHUB_OUTPUT; fi
        if [ -f scan-dirs-to-ignore.txt ]; then echo "dirs-to-ignore=$(cat scan-dirs-to-ignore.txt)" >> $GITHUB_OUTPUT; fi
    - id: write-global-trivyignore
      name: 'Write Global Trivy Ignore'
      uses: 'ymeadows/github-actions-public/.github/actions/append-steps-cve-ignore-list@main'
    - name: Run Trivy vulnerability scanner (using cached definitions)
      id: trivy-scan
      uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.2
      if: ${{ github.actor != 'dependabot[bot]' }}
      continue-on-error: true
      with:
        image-ref: 'gcr.io/t0-prod/${{ steps.docker-name-step.outputs.docker-name }}:pr-test-${{ inputs.epoch }}.${{ github.run_number }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        scanners: 'vuln,misconfig'
        skip-files: ${{ steps.trivy-configuration.outputs.files-to-ignore }}
        skip-dirs: ${{ steps.trivy-configuration.outputs.dirs-to-ignore }}
      env:
        TRIVY_SKIP_DB_UPDATE: true
        TRIVY_SKIP_JAVA_DB_UPDATE: true
        # Use AWS' ECR mirror for the trivy-db image, as GitHub's Container
        # Registry is returning a TOOMANYREQUESTS error.
        # Ref: https://github.com/aquasecurity/trivy-action/issues/389
        TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db:2'
    - name: Run Trivy vulnerability scanner (second attempt)
      id: trivy-scan-second-attempt
      uses: aquasecurity/trivy-action@97e0b3872f55f89b95b2f65b3dbab56962816478 # v0.34.2
      if: ${{ github.actor != 'dependabot[bot]' &&  steps.trivy-scan.outcome == 'failure'}}
      with:
        image-ref: 'gcr.io/t0-prod/${{ steps.docker-name-step.outputs.docker-name }}:pr-test-${{ inputs.epoch }}.${{ github.run_number }}'
        format: 'table'
        exit-code: '1'
        ignore-unfixed: true
        vuln-type: 'os,library'
        scanners: 'vuln,misconfig'
        skip-files: ${{ steps.trivy-configuration.outputs.files-to-ignore }}
        skip-dirs: ${{ steps.trivy-configuration.outputs.dirs-to-ignore }}
      env:
        # Use AWS' ECR mirror for the trivy-db image, as GitHub's Container
        # Registry is returning a TOOMANYREQUESTS error.
        # Ref: https://github.com/aquasecurity/trivy-action/issues/389
        TRIVY_DB_REPOSITORY: 'public.ecr.aws/aquasecurity/trivy-db:2'
